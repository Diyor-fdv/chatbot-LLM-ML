services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      APP_ENV: dev
      LOG_LEVEL: INFO
      API_AUTH_ENABLED: "true"
      API_KEYS: "dev-local-key-1,dev-local-key-2"
      DATABASE_URL: postgresql+psycopg://chatbot:chatbot@db:5432/chatbot
      SEMANTIC_LAYER_PATH: config/semantic_layer.yml
      LLM_ENABLED: "false"
      DEFAULT_LIMIT: "500"
      MAX_ROWS: "5000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata:
